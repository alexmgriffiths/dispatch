services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ota
      POSTGRES_USER: ota_user
      POSTGRES_PASSWORD: ota_pass
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ota_user -d ota"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/ota-updates &&
      echo 'Bucket created'
      "

  # Uncomment to run the full server in Docker instead of locally
  # server:
  #   build: .
  #   environment:
  #     DATABASE_URL: postgres://ota_user:ota_pass@db:5432/ota
  #     S3_BUCKET: ota-updates
  #     S3_BASE_URL: http://localhost:9000/ota-updates
  #     S3_REGION: us-east-1
  #     AWS_ENDPOINT_URL: http://minio:9000
  #     AWS_ACCESS_KEY_ID: minioadmin
  #     AWS_SECRET_ACCESS_KEY: minioadmin
  #     HOST: 0.0.0.0
  #     PORT: 9999
  #   ports:
  #     - "9999:9999"
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #     minio-init:
  #       condition: service_completed_successfully
  #   restart: unless-stopped

volumes:
  db_data:
  minio_data:
