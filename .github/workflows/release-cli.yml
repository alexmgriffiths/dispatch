name: Release CLI

on:
  push:
    branches: [main]
    paths:
      - "crates/dispatch-cli/**"

permissions:
  contents: write

jobs:
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and check if tag exists
        id: version
        run: |
          VERSION=$(grep '^version' crates/dispatch-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG="cli-v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VERSION detected, will release"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dispatch-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: dispatch-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: dispatch-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: dispatch-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p dispatch-cli

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/dispatch ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: Dispatch CLI v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/dispatch-linux-x64/dispatch-linux-x64
            artifacts/dispatch-linux-arm64/dispatch-linux-arm64
            artifacts/dispatch-darwin-x64/dispatch-darwin-x64
            artifacts/dispatch-darwin-arm64/dispatch-darwin-arm64
